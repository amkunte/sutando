name: Regen README WIRE list

on:
  schedule:
    # 02:37 UTC daily — off-peak, off-the-hour to avoid quota collisions
    - cron: "37 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regen WIRE list
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python3 scripts/regen-wire-list.py
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs(README): auto-regen WIRE list from playlist"
          branch: bot/regen-wire-list
          delete-branch: true
          title: "docs(README): auto-regen WIRE list from playlist"
          body: |
            Auto-generated by `.github/workflows/regen-wire-list.yml`.
            Source: `scripts/regen-wire-list.py` — fetches the Sutando WIRE
            YouTube playlist via Data API v3, ranks by recency + likes,
            dedups across newest/hero slots, and re-renders the block
            between `<!-- wire-list:start -->` / `<!-- wire-list:end -->`.

            If this PR keeps re-opening with the same content, the script
            is working but the diff is sticky — review + close as needed.
          labels: docs, auto-generated
